<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Analyst Portfolio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body {
    margin: 0;
    overflow-x: hidden;
    background: #0f172a;
    color: white;
    font-family: 'Poppins', sans-serif;
}

/* HERO TEXT */
#text {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    transform: translateY(-50%);
    z-index: 10;
}

h1 {
    font-size: 3rem;
}

/* Typing cursor effect */
.cursor {
    display: inline-block;
    width: 3px;
    background: white;
    margin-left: 5px;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* SUB HEADING */
.sub {
    color: #cbd5f5;
    margin-top: 10px;
    animation: fadeUp 2s ease infinite alternate;
}

/* FADE ANIMATION */
@keyframes fadeUp {
    from { opacity: 0.6; }
    to { opacity: 1; }
}

/* SCROLL SECTION */
section {
    padding: 80px 20px;
    text-align: center;
}

.hidden {
    opacity: 0;
    transform: translateY(40px);
}

.show {
    opacity: 1;
    transform: translateY(0);
    transition: 0.8s;
}

/* CARDS */
.card {
    background: rgba(255,255,255,0.05);
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    display: inline-block;
    width: 250px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}
</style>
</head>

<body>

<!-- TEXT -->
<div id="text">
    <h1><span id="typing"></span><span class="cursor"></span></h1>
    <p class="sub">Turning Data Into Business Decisions</p>
</div>

<!-- PROJECT SECTION -->
<section class="hidden">
    <h2>Projects</h2>
    <div class="card">Sales Dashboard</div>
    <div class="card">HR Analytics</div>
    <div class="card">E-commerce Analysis</div>
</section>

<script>
// ------------------ THREE JS ------------------
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xffffff, 1);
light.position.set(5,5,5);
scene.add(light);

// HEAD
const geometry = new THREE.SphereGeometry(1, 32, 32);
const material = new THREE.MeshStandardMaterial({ color: 0x38bdf8 });
const head = new THREE.Mesh(geometry, material);
scene.add(head);

// CURSOR FOLLOW
document.addEventListener("mousemove", (e) => {
    const x = (e.clientX / window.innerWidth) * 2 - 1;
    const y = -(e.clientY / window.innerHeight) * 2 + 1;

    head.rotation.y = x;
    head.rotation.x = y;
});

// LOOP
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}
animate();

// ------------------ TYPING LOOP ------------------
const text = "Business Analyst";
let i = 0;

function typingEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 100);
    } else {
        setTimeout(() => {
            document.getElementById("typing").innerHTML = "";
            i = 0;
            typingEffect();
        }, 1500);
    }
}

typingEffect();

// ------------------ SCROLL ANIMATION ------------------
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        }
    });
});

document.querySelectorAll('.hidden').forEach(el => observer.observe(el));

// RESIZE
window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});
</script>

</body>
</html>
