<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Analyst Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 0 60px;
}

/* TEXT */
.hero-text {
    max-width: 500px;
}

/* HEADINGS */
.main-heading {
    font-size: 3.5rem;
    font-weight: 700;
    animation: fadeUp 1s ease forwards;
}

.sub-heading {
    margin-top: 10px;
    font-size: 1.4rem;
    color: #cbd5f5;
    animation: fadeUp 1s ease 0.3s forwards;
}

/* FADE ANIMATION */
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px);}
    to { opacity: 1; transform: translateY(0);}
}

/* ROBOT (3D STYLE) */
.robot {
    width: 220px;
    height: 260px;
    background: linear-gradient(145deg, #1e293b, #334155);
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    position: relative;
}

/* HEAD */
.robot-head {
    width: 140px;
    height: 100px;
    background: linear-gradient(145deg, #38bdf8, #1e3a8a);
    border-radius: 15px;
    position: absolute;
    top: 30px;
    left: 40px;
}

/* EYES */
.eye {
    width: 30px;
    height: 30px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 30px;
}

.eye.left { left: 25px; }
.eye.right { right: 25px; }

.pupil {
    width: 12px;
    height: 12px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 9px;
    left: 9px;
}

/* SECTION */
section {
    padding: 80px 20px;
    text-align: center;
}

.hidden {
    opacity: 0;
    transform: translateY(40px);
}

.show {
    opacity: 1;
    transform: translateY(0);
    transition: 0.8s;
}

/* SKILLS */
.skills {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.skill {
    background: rgba(255,255,255,0.05);
    padding: 15px 25px;
    border-radius: 10px;
    transition: 0.3s;
}

.skill:hover {
    transform: translateY(-5px) scale(1.05);
}

/* PROJECTS */
.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 10px 30px rgba(56,189,248,0.3);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

    <!-- ROBOT LEFT -->
    <div class="robot">
        <div class="robot-head">
            <div class="eye left"><div class="pupil"></div></div>
            <div class="eye right"><div class="pupil"></div></div>
        </div>
    </div>

    <!-- TEXT RIGHT -->
    <div class="hero-text">
        <h1 class="main-heading" id="typing"></h1>
        <p class="sub-heading">Turning Data Into Business Decisions</p>
    </div>

</div>

<!-- ABOUT -->
<section class="hidden">
    <h2>About Me</h2>
    <p>I am a Business Analyst skilled in Power BI, SQL, and data-driven decision making.</p>
</section>

<!-- SKILLS -->
<section class="hidden">
    <h2>Skills</h2>
    <div class="skills">
        <div class="skill">Power BI</div>
        <div class="skill">SQL</div>
        <div class="skill">Data Analysis</div>
        <div class="skill">Business Insights</div>
    </div>
</section>

<!-- PROJECTS -->
<section class="hidden">
    <h2>Projects</h2>
    <div class="projects">
        <div class="card">Sales Dashboard</div>
        <div class="card">HR Analytics</div>
        <div class="card">E-commerce Analysis</div>
    </div>
</section>

<script>
// TYPING LOOP
const text = "Business Analyst";
let i = 0;

function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 100);
    } else {
        setTimeout(() => {
            document.getElementById("typing").innerHTML = "";
            i = 0;
            typing();
        }, 1500);
    }
}
typing();

// SCROLL ANIMATION
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add('show');
        }
    });
});
document.querySelectorAll('.hidden').forEach(el => observer.observe(el));

// EYE FOLLOW
const pupils = document.querySelectorAll(".pupil");

document.addEventListener("mousemove", (e) => {
    pupils.forEach(pupil => {
        const rect = pupil.parentElement.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        const angle = Math.atan2(e.clientY - y, e.clientX - x);

        const moveX = Math.cos(angle) * 6;
        const moveY = Math.sin(angle) * 6;

        pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
});
</script>

</body>
</html>
