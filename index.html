<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Analyst Portfolio</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: 'Poppins', sans-serif;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 0 50px;
}

/* TEXT */
.hero-text {
    max-width: 500px;
}

h1 {
    font-size: 3rem;
}

/* CURSOR */
.cursor {
    width: 3px;
    background: white;
    display: inline-block;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}

/* SUB */
.sub {
    margin-top: 10px;
    color: #cbd5f5;
    animation: fade 2s infinite alternate;
}

@keyframes fade {
    from { opacity: 0.6; }
    to { opacity: 1; }
}

/* ROBOT */
.robot {
    width: 200px;
    height: 250px;
    background: #1e293b;
    border-radius: 20px;
    position: relative;
}

.eye {
    width: 40px;
    height: 40px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 60px;
}

.eye.left { left: 30px; }
.eye.right { right: 30px; }

.pupil {
    width: 15px;
    height: 15px;
    background: black;
    border-radius: 50%;
    position: absolute;
    top: 12px;
    left: 12px;
}

/* SECTION */
section {
    padding: 80px 20px;
    text-align: center;
}

/* SKILLS */
.skills {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.skill {
    background: rgba(255,255,255,0.05);
    padding: 15px 25px;
    border-radius: 10px;
    transition: 0.3s;
}

.skill:hover {
    transform: scale(1.1);
}

/* PROJECTS */
.card {
    background: rgba(255,255,255,0.05);
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    display: inline-block;
    width: 250px;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

    <!-- LEFT TEXT -->
    <div class="hero-text">
        <h1><span id="typing"></span><span class="cursor"></span></h1>
        <p class="sub">Turning Data Into Business Decisions</p>
    </div>

    <!-- RIGHT ROBOT -->
    <div class="robot">
        <div class="eye left"><div class="pupil"></div></div>
        <div class="eye right"><div class="pupil"></div></div>
    </div>

</div>

<!-- ABOUT -->
<section>
    <h2>About Me</h2>
    <p>I am a Business Analyst skilled in Power BI, SQL, and data-driven decision making.</p>
</section>

<!-- SKILLS -->
<section>
    <h2>Skills</h2>
    <div class="skills">
        <div class="skill">Power BI</div>
        <div class="skill">SQL</div>
        <div class="skill">Data Analysis</div>
        <div class="skill">Business Insights</div>
    </div>
</section>

<!-- PROJECTS -->
<section>
    <h2>Projects</h2>
    <div class="card">Sales Dashboard</div>
    <div class="card">HR Analytics</div>
    <div class="card">E-commerce Analysis</div>
</section>

<script>
// TYPING EFFECT
const text = "Business Analyst";
let i = 0;

function typingEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 100);
    }
}
typingEffect();

// EYE FOLLOW
const pupils = document.querySelectorAll(".pupil");

document.addEventListener("mousemove", (e) => {
    pupils.forEach(pupil => {
        const rect = pupil.parentElement.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        const angle = Math.atan2(e.clientY - y, e.clientX - x);

        const moveX = Math.cos(angle) * 8;
        const moveY = Math.sin(angle) * 8;

        pupil.style.transform = `translate(${moveX}px, ${moveY}px)`;
    });
});
</script>

</body>
</html>
